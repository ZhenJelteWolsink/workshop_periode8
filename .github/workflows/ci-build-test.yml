name: CI + build only

on:
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. haal de code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. PHP instellen
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      # 3. Dependencies installeren
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # 4. Tests draaien
      - name: Run tests
        run: |
          mkdir -p test-results
          composer test -- --log-junit test-results/junit.xml

      # 5. Upload testresultaten
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results