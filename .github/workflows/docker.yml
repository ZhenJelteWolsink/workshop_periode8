name: Build & Push Docker

on: 
  push:
    tags:
      - 'v*'
 
jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      users: actions/Checkout@v4
      
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --passwolrd-stdin
      
    - name: Extract version
      id: vars
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }} /app:$ {{ steps.vars.outputs.VERSION }} .
        docker build -t ${{ secrets.DOCKER_USERNAME }} /app:latest .
        
    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/app:${{ steps.vars.outputs.VERSION }}
        docker push ${{ secrets.DOCKER_USERNAME }}/app:latest
     
    
            